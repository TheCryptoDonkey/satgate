<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>satgate</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0a0a1a, #0d1525);
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2.5rem 1rem;
  line-height: 1.6;
}

.container { max-width: 720px; width: 100%; }

/* Hero */
.hero { text-align: center; margin-bottom: 2rem; }
.hero .icon { font-size: 5rem; display: block; margin-bottom: 0.5rem; }
.hero h1 {
  font-size: 3rem; font-weight: 800;
  background: linear-gradient(135deg, #06b6d4, #22d3ee);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 0.5rem;
}
.hero .tagline { color: #94a3b8; font-size: 1.3rem; }

/* Free tier chip */
.free-chip {
  text-align: center; margin-bottom: 1.5rem;
}
.free-chip .chip {
  display: inline-block;
  background: rgba(6, 182, 212, 0.1);
  border: 1px solid rgba(6, 182, 212, 0.3);
  color: #22d3ee; padding: 0.4rem 0.9rem;
  border-radius: 999px; font-size: 0.95rem;
  font-family: 'SF Mono', 'Fira Code', monospace;
}

/* Chat area */
.chat-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 1rem;
  overflow: hidden;
  margin-bottom: 1.25rem;
}
.messages {
  padding: 1.5rem;
  min-height: 320px;
  max-height: 60vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.msg {
  max-width: 85%;
  padding: 0.75rem 1.1rem;
  border-radius: 0.75rem;
  font-size: 1.1rem;
  line-height: 1.6;
  word-wrap: break-word;
  overflow-wrap: break-word;
  min-width: 0;
}
.msg.user {
  align-self: flex-end;
  background: rgba(6, 182, 212, 0.15);
  border: 1px solid rgba(6, 182, 212, 0.25);
  color: #e2e8f0;
}
.msg.assistant {
  align-self: flex-start;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #cbd5e1;
}
.msg .model-tag {
  font-size: 0.8rem;
  color: #64748b;
  margin-bottom: 0.3rem;
  font-family: monospace;
}
.msg .thinking {
  font-size: 0.85rem; color: #64748b; font-style: italic;
  margin-bottom: 0.3rem; padding-bottom: 0.3rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.msg .thinking::before { content: 'thinking... '; color: #475569; }
.msg .thinking:empty { display: none; }

/* Input bar */
.input-bar {
  display: flex; gap: 0.6rem;
  padding: 0.85rem 1.1rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  background: rgba(0,0,0,0.15);
}
.input-bar input {
  flex: 1; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #e2e8f0; padding: 0.7rem 1rem;
  border-radius: 0.5rem; font-size: 1.1rem;
  font-family: inherit; outline: none;
}
.input-bar input::placeholder { color: #475569; }
.input-bar input:focus { border-color: rgba(6,182,212,0.4); }
.input-bar button {
  background: linear-gradient(135deg, #06b6d4, #22d3ee);
  border: none; color: #0a0a1a; font-weight: 700;
  padding: 0.7rem 1.5rem; border-radius: 0.5rem;
  font-size: 1.1rem; cursor: pointer; font-family: inherit;
}
.input-bar button:hover { filter: brightness(1.1); }
.input-bar button:disabled {
  opacity: 0.5; cursor: not-allowed; filter: none;
}

/* New chat button */
.new-chat-btn {
  display: none;
  margin: 0 auto 1rem;
  padding: 0.45rem 1rem;
  border-radius: 0.5rem;
  font-size: 0.9rem;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: #94a3b8;
  cursor: pointer;
  font-family: inherit;
}
.new-chat-btn:hover { border-color: rgba(6,182,212,0.4); color: #22d3ee; }

/* Status bar — inside chat-box, above input */
.status-bar {
  text-align: center; font-size: 0.85rem; color: #64748b;
  padding: 0.4rem 1rem;
  border-top: 1px solid rgba(255,255,255,0.04);
  background: rgba(0,0,0,0.1);
}
.status-bar:empty { display: none; }
.status-bar .free { color: #4ade80; }
.status-bar .credit { color: #22d3ee; }

/* Payment overlay — inside chat-box, hidden by default */
.payment-overlay {
  display: none;
  background: rgba(0,0,0,0.85);
  border-top: 1px solid rgba(6,182,212,0.2);
  padding: 1.75rem;
  text-align: center;
}
.payment-overlay h3 { color: #22d3ee; margin-bottom: 0.35rem; font-size: 1.3rem; }
.payment-overlay .sub { color: #94a3b8; font-size: 1rem; margin-bottom: 1.25rem; }
.qr-container {
  width: 260px; margin: 0 auto 1.25rem;
  background: #fff; border-radius: 0.75rem; padding: 1rem;
  min-height: 80px;
}
.qr-container svg { width: 100%; height: auto; display: block; }
.payment-actions { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }
.btn-outline {
  padding: 0.55rem 1.15rem; border-radius: 0.5rem; font-size: 1rem;
  background: transparent; border: 1px solid rgba(6,182,212,0.4);
  color: #22d3ee; cursor: pointer; font-family: inherit;
}
.btn-outline:hover { background: rgba(6,182,212,0.1); }
.btn-solid {
  padding: 0.55rem 1.15rem; border-radius: 0.5rem; font-size: 1rem;
  background: linear-gradient(135deg, #06b6d4, #22d3ee);
  border: none; color: #0a0a1a; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.btn-solid:hover { filter: brightness(1.1); }
.poll-status { color: #64748b; font-size: 0.9rem; margin-top: 0.75rem; }

/* Tier selection */
.tier-grid {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
  margin-bottom: 1.25rem; justify-content: center;
}
.tier-btn {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.75rem 1.1rem; border-radius: 0.6rem;
  background: rgba(6, 182, 212, 0.08);
  border: 1px solid rgba(6, 182, 212, 0.25);
  color: #e2e8f0; cursor: pointer; font-family: inherit; font-size: 1rem;
  transition: border-color 0.15s, background 0.15s;
}
.tier-btn:hover { background: rgba(6, 182, 212, 0.15); border-color: rgba(6, 182, 212, 0.5); }
.tier-btn .amount { font-weight: 700; color: #22d3ee; }
.tier-btn .tokens { font-size: 0.85rem; color: #94a3b8; }
.tier-btn.selected {
  background: rgba(6, 182, 212, 0.2);
  border-color: rgba(6, 182, 212, 0.6);
  color: #22d3ee;
}

/* Model selector cards */
.model-selector {
  display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 1.5rem;
}
.model-card {
  flex: 1; max-width: 320px; padding: 0.9rem 1.1rem;
  border-radius: 0.75rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8; cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  font-family: inherit;
}
.model-card:hover:not(:disabled) {
  border-color: rgba(6,182,212,0.4);
  background: rgba(255,255,255,0.05);
}
.model-card:disabled { opacity: 0.4; cursor: not-allowed; }
.model-card.active {
  background: rgba(6, 182, 212, 0.08);
  border-color: rgba(6, 182, 212, 0.5);
}
.model-card .model-name {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 1rem; font-weight: 600; color: #e2e8f0;
  margin-bottom: 0.25rem;
}
.model-card.active .model-name { color: #22d3ee; }
.model-card .model-desc {
  font-size: 0.85rem; color: #64748b; margin-bottom: 0.35rem;
}
.model-card .model-price {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.8rem; color: #475569;
}

/* Footer */
.footer {
  text-align: center; font-size: 0.9rem; color: #475569;
  margin-top: 0.75rem;
}
.footer a { color: #64748b; text-decoration: none; }
.footer a:hover { color: #22d3ee; }
.footer .links {
  display: flex; gap: 1.25rem; justify-content: center;
  margin-top: 0.5rem; font-size: 0.85rem;
  font-family: 'SF Mono', 'Fira Code', monospace;
}

/* Mobile */
@media (max-width: 480px) {
  body { padding: 1.5rem 0.75rem; }
  .hero .icon { font-size: 3.5rem; }
  .hero h1 { font-size: 2rem; }
  .hero .tagline { font-size: 1.05rem; }
  .model-selector { flex-direction: column; gap: 0.5rem; }
  .model-card { max-width: 100%; }
  .model-card .model-name { font-size: 0.9rem; }
  .model-card .model-desc { font-size: 0.8rem; }
  .msg { font-size: 0.95rem; }
  .input-bar { gap: 0.4rem; padding: 0.65rem 0.7rem; }
  .input-bar input { font-size: 0.95rem; padding: 0.6rem 0.75rem; }
  .input-bar button { font-size: 0.95rem; padding: 0.6rem 1rem; }
  .messages { min-height: 240px; padding: 1rem; }
  .status-bar { font-size: 0.85rem; }
  .payment-overlay h3 { font-size: 1.1rem; }
  .qr-container { width: 180px; }
  .tier-grid { max-width: 100%; }
  .tier-btn { font-size: 0.9rem; padding: 0.6rem 0.9rem; }
  .footer .links { flex-wrap: wrap; gap: 0.75rem; }
}
</style>
</head>
<body>
<div class="container">

  <!-- HERO -->
  <div class="hero">
    <span class="icon">&#x1F6F8;</span>
    <h1>satgate</h1>
    <p class="tagline">Pay-per-token AI inference. No accounts. Just sats.</p>
  </div>

  <!-- MODEL SELECTOR (populated by JS) -->
  <div id="model-selector" class="model-selector"></div>

  <!-- FREE TIER CHIP -->
  <div id="free-chip" class="free-chip"></div>

  <!-- NEW CHAT -->
  <button id="new-chat-btn" class="new-chat-btn" onclick="newChat()">New chat</button>

  <!-- CHAT BOX -->
  <div class="chat-box">
    <div id="messages" class="messages"></div>
    <div id="payment-overlay" class="payment-overlay"></div>
    <div id="status-bar" class="status-bar"></div>
    <div class="input-bar">
      <input id="prompt-input" type="text" placeholder="Ask anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleSend()}">
      <button id="send-btn" onclick="handleSend()">Send</button>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <p>Powered by <a href="https://github.com/TheCryptoDonkey/toll-booth" target="_blank">toll-booth</a> &#x2014; L402 Lightning middleware</p>
    <div class="links">
      <a href="https://github.com/TheCryptoDonkey/satgate" target="_blank">GitHub</a>
      <a href="/.well-known/l402">/.well-known/l402</a>
      <a href="/llms.txt">/llms.txt</a>
      <a href="/openapi.json">/openapi.json</a>
    </div>
  </div>

</div>
<script>
(function() {
  'use strict';

  // State
  var messages = [];          // { role, content } array
  var currentModel = null;    // from /.well-known/l402
  var abortController = null;
  var pollTimer = null;
  var pendingPrompt = null;   // saved when 402 interrupts
  var invoiceData = null;     // current invoice (bolt11, macaroon, qr_svg)
  var scrollPending = false;  // rAF debounce for scrollToBottom
  var pricePerThousand = null; // sats per 1k tokens for current model
  var modelPricing = {};       // { modelId: perThousandTokens }
  var defaultPricePerThousand = null;
  var topupTiers = [];         // [{amountSats, approxTokens}] from well-known or defaults
  var serverTiersRaw = [];     // raw tier data for recalc on model switch

  // Free token budget — tracked client-side, resets daily
  var FREE_TOKEN_BUDGET = 250;
  var freeTokensKey = 'satgate_free_tokens';
  var freeTokensDayKey = 'satgate_free_day';
  function todayStr() { return new Date().toISOString().slice(0, 10); }
  function getFreeTokens() {
    // Reset budget if it's a new day
    var day = sessionStorage.getItem(freeTokensDayKey);
    if (day !== todayStr()) {
      sessionStorage.setItem(freeTokensKey, String(FREE_TOKEN_BUDGET));
      sessionStorage.setItem(freeTokensDayKey, todayStr());
      return FREE_TOKEN_BUDGET;
    }
    var v = sessionStorage.getItem(freeTokensKey);
    return v === null ? FREE_TOKEN_BUDGET : parseInt(v, 10);
  }
  function spendFreeTokens(count) {
    var remaining = Math.max(0, getFreeTokens() - count);
    sessionStorage.setItem(freeTokensKey, String(remaining));
    sessionStorage.setItem(freeTokensDayKey, todayStr());
    return remaining;
  }

  // DOM refs
  var messagesEl = document.getElementById('messages');
  var inputEl = document.getElementById('prompt-input');
  var sendBtn = document.getElementById('send-btn');
  var statusBar = document.getElementById('status-bar');
  var modelSelectorEl = document.getElementById('model-selector');
  var freeChipEl = document.getElementById('free-chip');
  var paymentOverlay = document.getElementById('payment-overlay');
  var newChatBtn = document.getElementById('new-chat-btn');

  // Get stored L402 token
  function getToken() {
    return localStorage.getItem('l402_token');
  }
  function setToken(token) {
    localStorage.setItem('l402_token', token);
  }
  function clearToken() {
    localStorage.removeItem('l402_token');
    localStorage.removeItem('satgate_credit_sats');
  }
  function getCreditSats() {
    var v = localStorage.getItem('satgate_credit_sats');
    return v !== null ? parseInt(v, 10) : null;
  }
  function setCreditSats(sats) {
    localStorage.setItem('satgate_credit_sats', String(sats));
  }

  // === DOM HELPERS ===
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function(k) {
        if (k === 'className') { node.className = attrs[k]; }
        else if (k === 'textContent') { node.textContent = attrs[k]; }
        else if (k === 'style') { node.style.cssText = attrs[k]; }
        else if (k.startsWith('on')) { node[k] = attrs[k]; }
        else { node.setAttribute(k, attrs[k]); }
      });
    }
    if (children) {
      children.forEach(function(c) {
        if (typeof c === 'string') { node.appendChild(document.createTextNode(c)); }
        else if (c) { node.appendChild(c); }
      });
    }
    return node;
  }

  function makeErrorSpan(text) {
    return el('span', { style: 'color:#f87171', textContent: text });
  }

  function makeStatusSpan(cls, text) {
    return el('span', { className: cls, textContent: text });
  }

  // === INIT ===
  async function init() {
    try {
      var res = await fetch('/.well-known/l402');
      var data = await res.json();

      // Extract models and pricing
      var models = (data.capabilities && data.capabilities.models) || [];
      var pricing = data.pricing || {};
      var freeTier = data.free_tier || {};

      // Store all model pricing
      if (pricing.models) {
        Object.keys(pricing.models).forEach(function(model) {
          var p = pricing.models[model];
          modelPricing[model] = (p && p.perThousandTokens !== undefined) ? p.perThousandTokens : p;
        });
      }
      if (pricing.default) {
        var defp = pricing.default;
        defaultPricePerThousand = (defp && defp.perThousandTokens !== undefined) ? defp.perThousandTokens : defp;
      }

      // Set current model and resolve price per 1k tokens
      currentModel = models[0] || null;
      pricePerThousand = currentModel && modelPricing[currentModel]
        ? modelPricing[currentModel]
        : defaultPricePerThousand;

      // Model descriptions
      var modelDescriptions = {
        'qwen3:0.6b': 'Fast & cheap \u2014 simple queries, quick answers',
        'gemma3:4b': 'Capable \u2014 better reasoning, longer answers',
      };

      // Build model selector cards
      buildModelCards(models, modelDescriptions);

      // Free tier chip
      while (freeChipEl.firstChild) { freeChipEl.removeChild(freeChipEl.firstChild); }
      freeChipEl.appendChild(el('span', { className: 'chip', textContent: formatTokenCount(FREE_TOKEN_BUDGET) + ' free tokens to start' }));

      // Store raw tiers for recalc on model switch
      serverTiersRaw = (data.payment && data.payment.tiers) || [];
      recalcTopupTiers();

      // Show token balance
      if (getToken()) {
        var savedSats = getCreditSats();
        if (savedSats !== null) updateStatusBar(String(savedSats));
      } else {
        updateFreeTokenStatus();
      }
    } catch (e) {
      while (freeChipEl.firstChild) { freeChipEl.removeChild(freeChipEl.firstChild); }
      freeChipEl.appendChild(el('span', { className: 'chip', textContent: 'Could not load pricing' }));
    }
    inputEl.focus();
  }

  // === MODEL CARDS ===
  function buildModelCards(models, descriptions) {
    while (modelSelectorEl.firstChild) { modelSelectorEl.removeChild(modelSelectorEl.firstChild); }
    if (models.length <= 1) return;
    models.forEach(function(model) {
      var price = modelPricing[model] || defaultPricePerThousand;
      var desc = descriptions[model] || '';
      var card = el('button', {
        className: 'model-card' + (model === currentModel ? ' active' : ''),
      }, [
        el('div', { className: 'model-name', textContent: model }),
        desc ? el('div', { className: 'model-desc', textContent: desc }) : null,
        el('div', { className: 'model-price', textContent: Math.floor(1000 / price) + ' tokens/sat' }),
      ]);
      card.setAttribute('data-model', model);
      card.onclick = function() { switchModel(model); };
      modelSelectorEl.appendChild(card);
    });
  }

  // === MODEL SWITCHING ===
  function switchModel(model) {
    currentModel = model;
    pricePerThousand = modelPricing[model] || defaultPricePerThousand;
    recalcTopupTiers();

    // Update card active state
    var cards = modelSelectorEl.querySelectorAll('.model-card');
    for (var i = 0; i < cards.length; i++) {
      var isActive = cards[i].getAttribute('data-model') === model;
      cards[i].className = 'model-card' + (isActive ? ' active' : '');
    }

    // Refresh status bar — paid balance is in sats (model-independent),
    // free tier is in tokens (model-independent budget)
    if (getToken()) {
      var savedSats = getCreditSats();
      if (savedSats !== null) updateStatusBar(String(savedSats));
    } else {
      updateFreeTokenStatus();
    }

    // Re-render payment UI if overlay is visible (updates tier token estimates)
    if (paymentOverlay.style.display === 'block') {
      showPayment();
    }
  }

  function recalcTopupTiers() {
    if (serverTiersRaw.length > 0) {
      topupTiers = serverTiersRaw.map(function(t) {
        var tokens = pricePerThousand ? Math.floor((t.amountSats / pricePerThousand) * 1000) : 0;
        return { amountSats: t.amountSats, approxTokens: tokens };
      });
    } else if (pricePerThousand) {
      topupTiers = [
        { amountSats: 100 },
        { amountSats: 500 },
        { amountSats: 2100 },
      ].map(function(t) {
        return { amountSats: t.amountSats, approxTokens: Math.floor((t.amountSats / pricePerThousand) * 1000) };
      });
    }
  }

  // === SEND MESSAGE ===
  // Expose globally for onclick handlers
  window.handleSend = function() {
    var text = inputEl.value.trim();
    if (!text) return;
    if (abortController) {
      // Currently streaming — abort
      abortController.abort();
      abortController = null;
      setIdle();
      return;
    }
    sendMessage(text);
  };

  async function sendMessage(text) {
    inputEl.value = '';
    pendingPrompt = null;

    // Check if free token budget is exhausted (and no paid credential)
    var token = getToken();
    if (!token && getFreeTokens() <= 0) {
      pendingPrompt = text;
      showPayment();
      return;
    }

    // Append user message
    messages.push({ role: 'user', content: text });
    var userDiv = renderUserMessage(text);

    // Create empty assistant message
    var assistantResult = renderAssistantMessage();
    var contentEl = assistantResult.contentEl;
    var modelTagEl = assistantResult.modelTagEl;
    var thinkingEl = assistantResult.thinkingEl;
    var assistantDiv = assistantResult.div;

    newChatBtn.style.display = 'block';
    setStreaming();
    scrollToBottom();

    abortController = new AbortController();
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = token;

    try {
      var res = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({
          model: currentModel,
          messages: [
            { role: 'system', content: 'Be concise.' },
          ].concat(messages),
          stream: true,
          think: false,
        }),
        signal: abortController.signal,
      });

      if (res.status === 200) {
        // Read balance headers immediately
        var creditBalance = res.headers.get('X-Credit-Balance');
        var freeRemaining = res.headers.get('X-Free-Remaining');
        var creditSats = creditBalance !== null ? parseInt(creditBalance, 10) : NaN;
        var isPaid = !isNaN(creditSats) && creditSats >= 0;

        var onChunk = null;
        if (isPaid) {
          // Show server-reported balance (after hold deduction) — no client-side guessing
          updateStatusBar(String(creditSats));
          onChunk = null; // balance updates on next request via X-Credit-Balance header
        } else {
          // Free tier countdown
          spendFreeTokens(estimateTokens(text));
          updateFreeTokenStatus();
          onChunk = function(chunkText) {
            spendFreeTokens(estimateTokens(chunkText));
            updateFreeTokenStatus();
          };
        }

        await streamResponse(res, contentEl, thinkingEl, modelTagEl, onChunk);
        var fullText = contentEl.textContent || '';
        messages.push({ role: 'assistant', content: fullText });
        // Collapse thinking once answer is complete
        if (thinkingEl.textContent) thinkingEl.style.display = 'none';

        // Sync client budget with server's free-tier state
        if (!isPaid && freeRemaining !== null && parseInt(freeRemaining, 10) === 0) {
          sessionStorage.setItem(freeTokensKey, '0');
          showPayment();
        } else if (!isPaid && getFreeTokens() <= 0) {
          showPayment();
        }
      } else if (res.status === 402) {
        // Payment required — server says free tier exhausted
        if (token) clearToken(); // token expired/invalid
        // Zero out client-side free budget to match server state
        sessionStorage.setItem(freeTokensKey, '0');
        pendingPrompt = text;
        // Remove the user message and empty assistant div
        messages.pop(); // remove user message we just added
        userDiv.remove();
        assistantDiv.remove();
        if (messages.length === 0) newChatBtn.style.display = 'none';
        var body = await res.json();
        showPayment();
      } else if (res.status === 503) {
        while (contentEl.firstChild) { contentEl.removeChild(contentEl.firstChild); }
        contentEl.appendChild(makeErrorSpan('Server busy \u2014 try again in a moment.'));
      } else {
        while (contentEl.firstChild) { contentEl.removeChild(contentEl.firstChild); }
        contentEl.appendChild(makeErrorSpan('Error: ' + res.status));
      }
    } catch (e) {
      if (e.name === 'AbortError') {
        // User cancelled — keep partial content
        if (!contentEl.textContent) {
          assistantDiv.remove();
        }
      } else {
        while (contentEl.firstChild) { contentEl.removeChild(contentEl.firstChild); }
        contentEl.appendChild(makeErrorSpan('Network error \u2014 check your connection.'));
      }
    }

    abortController = null;
    setIdle();
  }

  // === STREAM RESPONSE ===
  async function streamResponse(res, contentEl, thinkingEl, modelTagEl, onChunk) {
    if (!res.body) return;
    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    var fullContent = '';
    var fullReasoning = '';
    var gotModel = false;

    function processDelta(delta) {
      if (!delta) return;
      // Handle reasoning (thinking) chunks — display but don't count toward free budget
      if (delta.reasoning) {
        fullReasoning += delta.reasoning;
        thinkingEl.textContent = fullReasoning;
        scrollToBottom();
      }
      // Handle content chunks — these count toward token budget
      if (delta.content) {
        fullContent += delta.content;
        contentEl.textContent = fullContent;
        scrollToBottom();
        if (onChunk) onChunk(delta.content);
      }
    }

    while (true) {
      var result = await reader.read();
      if (result.done) break;
      buffer += decoder.decode(result.value, { stream: true });

      var lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line.startsWith('data: ')) continue;
        var payload = line.slice(6);
        if (payload === '[DONE]') {
          reader.cancel();
          return;
        }
        try {
          var json = JSON.parse(payload);
          if (!gotModel && json.model) {
            modelTagEl.textContent = json.model;
            gotModel = true;
          }
          var delta = json.choices && json.choices[0] && json.choices[0].delta;
          processDelta(delta);
        } catch (parseErr) {
          // skip malformed JSON
        }
      }
    }

    // Flush any remaining data in the buffer after stream ends
    if (buffer.trim().startsWith('data: ')) {
      var remaining = buffer.trim().slice(6);
      if (remaining !== '[DONE]') {
        try {
          var lastJson = JSON.parse(remaining);
          if (!gotModel && lastJson.model) modelTagEl.textContent = lastJson.model;
          var lastDelta = lastJson.choices && lastJson.choices[0] && lastJson.choices[0].delta;
          processDelta(lastDelta);
        } catch (e) { /* skip */ }
      }
    }
  }

  // === PAYMENT ===
  // Build the payment overlay DOM using DOM methods. QR SVG from the server is
  // parsed via DOMParser and sanitised (scripts/event handlers stripped) before import.
  // Refs for payment UI elements that persist across invoice reloads
  var paymentQrContainer = null;
  var paymentHeading = null;
  var paymentActions = null;
  var paymentPollStatus = null;
  var selectedTierIdx = 0;

  function buildPaymentUI() {
    while (paymentOverlay.firstChild) { paymentOverlay.removeChild(paymentOverlay.firstChild); }

    paymentHeading = el('h3', { textContent: '\u26A1 Top up to keep chatting' });
    var sub = el('p', { className: 'sub', textContent: 'Scan with any Lightning wallet' });
    paymentOverlay.appendChild(paymentHeading);
    paymentOverlay.appendChild(sub);

    // QR container — starts with spinner, replaced when invoice loads
    paymentQrContainer = el('div', { className: 'qr-container' });
    paymentQrContainer.appendChild(el('div', { className: 'poll-status', textContent: 'Loading...' }));
    paymentOverlay.appendChild(paymentQrContainer);

    // Action buttons
    paymentActions = el('div', { className: 'payment-actions' });
    var copyBtn = el('button', { className: 'btn-outline', textContent: 'Copy invoice' });
    copyBtn.onclick = window.copyInvoice;
    paymentActions.appendChild(copyBtn);
    if (window.webln) {
      var weblnBtn = el('button', { className: 'btn-solid', textContent: 'Pay with WebLN' });
      weblnBtn.onclick = window.payWithWebLN;
      paymentActions.appendChild(weblnBtn);
    }
    paymentOverlay.appendChild(paymentActions);

    // Tier buttons — inline row to switch amounts
    var tiers = topupTiers.length > 0 ? topupTiers : [{ amountSats: 1000, approxTokens: 0 }];
    var grid = el('div', { className: 'tier-grid' });
    tiers.forEach(function(tier, idx) {
      var btn = el('div', { className: 'tier-btn' + (idx === selectedTierIdx ? ' selected' : '') });
      btn.appendChild(el('span', { className: 'amount', textContent: tier.amountSats.toLocaleString() + ' sats' }));
      if (tier.approxTokens > 0) {
        btn.appendChild(el('span', { className: 'tokens', textContent: '~' + formatTokenCount(tier.approxTokens) + ' tokens' }));
      }
      btn.onclick = function() {
        selectedTierIdx = idx;
        loadInvoice(tier.amountSats);
        // Update selected state
        var btns = grid.querySelectorAll('.tier-btn');
        for (var i = 0; i < btns.length; i++) {
          btns[i].className = 'tier-btn' + (i === idx ? ' selected' : '');
        }
      };
      grid.appendChild(btn);
    });
    paymentOverlay.appendChild(grid);

    // Poll status
    paymentPollStatus = el('p', { className: 'poll-status', textContent: 'Waiting for payment...' });
    paymentOverlay.appendChild(paymentPollStatus);
  }

  async function loadInvoice(amountSats) {
    // Show spinner in QR area
    while (paymentQrContainer.firstChild) { paymentQrContainer.removeChild(paymentQrContainer.firstChild); }
    paymentQrContainer.appendChild(el('div', { className: 'poll-status', textContent: 'Loading...' }));
    if (paymentHeading) paymentHeading.textContent = '\u26A1 Scan to pay ' + amountSats + ' sats';
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

    try {
      var res = await fetch('/create-invoice', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amountSats: amountSats }),
      });
      var data = await res.json();
      invoiceData = data;

      // Render QR
      while (paymentQrContainer.firstChild) { paymentQrContainer.removeChild(paymentQrContainer.firstChild); }
      if (data.qr_svg) {
        var parser = new DOMParser();
        var svgDoc = parser.parseFromString(data.qr_svg, 'image/svg+xml');
        var svgEl = svgDoc.documentElement;
        if (svgEl && svgEl.tagName && svgEl.tagName.toLowerCase() === 'svg') {
          sanitiseSvg(svgEl);
          paymentQrContainer.appendChild(document.importNode(svgEl, true));
        }
      }

      // Start polling
      if (data.payment_url) {
        pollTimer = setInterval(function() {
          checkPayment(data.payment_url, data.macaroon);
        }, 3000);
      }
    } catch (e) {
      while (paymentQrContainer.firstChild) { paymentQrContainer.removeChild(paymentQrContainer.firstChild); }
      paymentQrContainer.appendChild(el('div', { className: 'poll-status', textContent: 'Could not create invoice. Try again.' }));
    }
  }

  async function showPayment() {
    paymentOverlay.style.display = 'block';
    while (statusBar.firstChild) { statusBar.removeChild(statusBar.firstChild); }
    selectedTierIdx = 0;
    buildPaymentUI();
    // Auto-load the first tier's invoice — zero extra clicks
    var tiers = topupTiers.length > 0 ? topupTiers : [{ amountSats: 1000 }];
    loadInvoice(tiers[0].amountSats);
    setIdle();
  }

  async function checkPayment(paymentUrl, macaroon) {
    try {
      var res = await fetch(paymentUrl);
      var data = await res.json();
      if (data.paid) {
        clearInterval(pollTimer);
        pollTimer = null;
        // Store L402 credential
        setToken('L402 ' + macaroon + ':' + data.preimage);
        // Dismiss overlay
        paymentOverlay.style.display = 'none';
        while (paymentOverlay.firstChild) { paymentOverlay.removeChild(paymentOverlay.firstChild); }
        // Show credit balance from invoice amount
        if (invoiceData && invoiceData.amount_sats) {
          updateStatusBar(String(invoiceData.amount_sats));
        }
        // Retry pending prompt
        if (pendingPrompt) {
          sendMessage(pendingPrompt);
        }
      }
    } catch (e) {
      // Polling error — keep trying
    }
  }

  // Copy invoice to clipboard
  window.copyInvoice = function() {
    if (invoiceData && invoiceData.bolt11) {
      navigator.clipboard.writeText(invoiceData.bolt11).then(function() {
        var btn = paymentOverlay.querySelector('.btn-outline');
        if (btn) {
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = 'Copy invoice'; }, 2000);
        }
      });
    }
  };

  // Pay with WebLN
  window.payWithWebLN = async function() {
    if (window.webln && invoiceData && invoiceData.bolt11) {
      try {
        await window.webln.enable();
        await window.webln.sendPayment(window._invoiceData.bolt11);
        // WebLN payment sent — polling will pick up the settlement
      } catch (e) {
        // WebLN failed — user can still scan QR
      }
    }
  };

  // === NEW CHAT ===
  window.newChat = function() {
    messages = [];
    while (messagesEl.firstChild) { messagesEl.removeChild(messagesEl.firstChild); }
    newChatBtn.style.display = 'none';
    paymentOverlay.style.display = 'none';
    while (paymentOverlay.firstChild) { paymentOverlay.removeChild(paymentOverlay.firstChild); }
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    if (abortController) { abortController.abort(); abortController = null; }
    pendingPrompt = null;
    setIdle();
    inputEl.focus();
    // Refresh status bar
    if (!getToken()) updateFreeTokenStatus();
  };

  // === RENDER HELPERS ===
  function renderUserMessage(text) {
    var div = el('div', { className: 'msg user', textContent: text });
    messagesEl.appendChild(div);
    return div;
  }

  function renderAssistantMessage() {
    var div = el('div', { className: 'msg assistant' });
    var modelTag = el('div', { className: 'model-tag', textContent: currentModel || '' });
    var thinking = el('div', { className: 'thinking' });
    var content = el('div', {});
    div.appendChild(modelTag);
    div.appendChild(thinking);
    div.appendChild(content);
    messagesEl.appendChild(div);
    return { div: div, contentEl: content, modelTagEl: modelTag, thinkingEl: thinking };
  }

  function formatTokenCount(n) {
    return n.toLocaleString();
  }

  // Rough token estimate: ~4 chars per token for English text
  function estimateTokens(text) {
    if (!text) return 0;
    return Math.ceil(text.length / 4);
  }

  function updateFreeTokenStatus() {
    while (statusBar.firstChild) { statusBar.removeChild(statusBar.firstChild); }
    var remaining = getFreeTokens();
    statusBar.appendChild(makeStatusSpan('free', formatTokenCount(remaining) + ' free tokens remaining'));
  }

  function updateStatusBar(creditBalance) {
    while (statusBar.firstChild) { statusBar.removeChild(statusBar.firstChild); }
    if (creditBalance !== null && creditBalance !== undefined) {
      var sats = parseInt(creditBalance, 10);
      if (!isNaN(sats) && sats >= 0) {
        setCreditSats(sats);
        statusBar.appendChild(makeStatusSpan('credit', sats.toLocaleString() + ' sats remaining'));
      }
    }
  }

  function setStreaming() {
    sendBtn.textContent = 'Stop';
    inputEl.disabled = true;
    var cards = modelSelectorEl.querySelectorAll('.model-card');
    for (var i = 0; i < cards.length; i++) cards[i].disabled = true;
  }

  function setIdle() {
    sendBtn.textContent = 'Send';
    inputEl.disabled = false;
    var cards = modelSelectorEl.querySelectorAll('.model-card');
    for (var i = 0; i < cards.length; i++) cards[i].disabled = false;
    if (paymentOverlay.style.display !== 'block') inputEl.focus();
  }

  function scrollToBottom() {
    if (!scrollPending) {
      scrollPending = true;
      requestAnimationFrame(function() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
        scrollPending = false;
      });
    }
  }

  function sanitiseSvg(svgEl) {
    // Remove <script> elements and event-handler attributes
    var scripts = svgEl.querySelectorAll('script');
    for (var i = 0; i < scripts.length; i++) scripts[i].remove();
    var all = svgEl.querySelectorAll('*');
    for (var j = 0; j < all.length; j++) {
      var attrs = all[j].attributes;
      for (var k = attrs.length - 1; k >= 0; k--) {
        if (attrs[k].name.startsWith('on')) all[j].removeAttribute(attrs[k].name);
      }
    }
  }

  // === START ===
  init();
})();
</script>
</body>
</html>
