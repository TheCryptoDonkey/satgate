# Production satgate configuration example.
#
# Copy this file to your working directory as satgate.yaml and adjust values.
# Configuration precedence: CLI flags > environment variables > this file > defaults.

upstream: http://localhost:11434
port: 3000

# Use SQLite for persistent credit balances across restarts
storage: sqlite
dbPath: ./satgate.db

# Trust X-Forwarded-For from a reverse proxy (Caddy, nginx, etc.)
trustProxy: true

# Don't auto-spawn a Cloudflare tunnel (you have your own domain)
tunnel: false

# Per-model token pricing (sats per 1,000 tokens)
pricing:
  default: 1
  models:
    llama3.2:1b: 1
    llama3.2:3b: 2
    deepseek-r1:7b: 3
    deepseek-r1:32b: 8
    qwen3:0.6b: 1

# Free tier: 250 sats of free usage per IP per day
freeTier:
  creditsPerDay: 250

# Protect the GPU: max 4 concurrent inference requests
capacity:
  maxConcurrent: 4

# Volume discount tiers
tiers:
  - amountSats: 1000
    creditSats: 1000
    label: "1,000 sats"
  - amountSats: 5000
    creditSats: 5500
    label: "5,000 sats (10% bonus)"
  - amountSats: 10000
    creditSats: 11100
    label: "10,000 sats (11% bonus)"

# Lightning backend (requires LIGHTNING_KEY env var)
lightning: phoenixd
lightningUrl: http://localhost:9740

# Logging
verbose: false
logFormat: json
