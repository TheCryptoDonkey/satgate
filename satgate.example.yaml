# satgate configuration
# See: https://github.com/TheCryptoDonkey/satgate

upstream: http://localhost:11434
port: 3000
# rootKey: ${ROOT_KEY}  # Set via env var for production
storage: sqlite
dbPath: ./satgate.db

pricing:
  default: 1          # 1 sat per 1k tokens
  models:
    llama3: 1
    deepseek-r1: 5
    mixtral-8x22b: 3

freeTier:
  creditsPerDay: 250

capacity:
  maxConcurrent: 4

tiers:
  - amountSats: 1000
    creditSats: 1000
    label: "1,000 sats"
  - amountSats: 5000
    creditSats: 5500
    label: "5,000 sats (10% bonus)"
  - amountSats: 10000
    creditSats: 11100
    label: "10,000 sats (11% bonus)"

